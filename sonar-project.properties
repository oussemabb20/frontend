# Keep static UI shells and style/theme definition files in source analysis, but do not
# require line coverage for areas that are not exercised by the current unit test suite.
sonar.coverage.exclusions=src/App.tsx,src/routes.jsx,src/main.tsx,src/assets/**,src/components/**,src/examples/**,src/hooks/**,src/layouts/**,src/store/**,src/utils/**,src/variables/**
